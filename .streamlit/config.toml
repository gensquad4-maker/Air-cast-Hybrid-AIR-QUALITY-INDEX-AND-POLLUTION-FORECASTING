# Streamlit Cloud Deployment Configuration

[client]
toolbarMode = "minimal"
showErrorDetails = false

[server]
# Run in headless mode (no browser window)
headless = true

# Default port for Streamlit
port = 8501

# IMPORTANT: Must be false to allow iframe embedding from frontend
enableCORS = false

# Disable XSRF protection for cross-origin iframe embedding
enableXsrfProtection = false

# Allow iframe embedding from any origin
[browser]
# Don't gather usage statistics
gatherUsageStats = false

# Server address configuration
serverAddress = "0.0.0.0"

[theme]
# Optional: Define your Glacier theme colors
primaryColor = "#22d3ee"
backgroundColor = "#050505"
secondaryBackgroundColor = "#080c14"
textColor = "#ffffff"
